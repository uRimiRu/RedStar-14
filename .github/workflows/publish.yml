name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0
        submodules: recursive

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Check build
      run: |
        dotnet restore
        dotnet build Content.Packaging --configuration Release --no-restore /m
        dotnet run --project Content.Packaging server --platform linux-x64
        dotnet run --project Content.Packaging client --no-wipe-release

    - name: Move live branch
      run: |
        git push origin "${GITHUB_SHA}:refs/heads/live" --force
