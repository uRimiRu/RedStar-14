name: PR Changelogs
concurrency: commit_action
on:
  pull_request_target:
    types: [closed]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CHANGELOG_DIR: ${{ vars.CHANGELOG_DIR }}
  PR_NUMBER: ${{ github.event.number }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout Master
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: "${{ vars.CHANGELOG_BRANCH || 'master' }}"
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name "${{ vars.CHANGELOG_USER || 'Changelog Bot' }}"
          git config --global user.email "${{ vars.CHANGELOG_EMAIL || 'actions@github.com' }}"
        shell: bash

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install Node Dependencies
        run: |
          if [ -d "Tools/changelog" ]; then
            cd "Tools/changelog"
            npm install
          fi
        shell: bash
        continue-on-error: true

      - name: Generate Changelog File
        run: |
          if [ -f "Tools/changelog/changelog.js" ]; then
            cd "Tools/changelog"
            node changelog.js
          fi
        shell: bash
        continue-on-error: true

      - name: Commit Changelog Changes
        run: |
          git add *.yml || true
          git commit -m "${{ vars.CHANGELOG_MESSAGE || 'Update changelog' }} (#${{ env.PR_NUMBER }})" || echo "No changes to commit"
          git push || echo "No changes to push"
        shell: bash
        continue-on-error: true

      - name: Install Python Dependencies
        run: |
          pip install requests pyyaml
        shell: bash

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 Tools/actions_changelogs_since_last_run.py
        shell: bash
