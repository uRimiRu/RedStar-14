name: PR Changelogs
concurrency: commit_action
on:
  pull_request_target:
    types: [closed]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CHANGELOG_DIR: ${{ vars.CHANGELOG_DIR }}
  PR_NUMBER: ${{ github.event.number }}

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    permissions:
      contents: write
    steps:
      - name: Checkout Master
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: "${{ vars.CHANGELOG_BRANCH }}"

      - name: Setup Git
        run: |
          git config --global user.name "${{ vars.CHANGELOG_USER }}"
          git config --global user.email "${{ vars.CHANGELOG_EMAIL }}"
        shell: bash

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Install Dependencies
        run: |
          cd "Tools/changelog"
          npm install
        shell: bash
        continue-on-error: true

      - name: Generate Changelog
        run: |
          cd "Tools/changelog"
          node changelog.js
        shell: bash
        continue-on-error: true

      - name: Commit Changelog
        run: |
          git add *.yml
          git commit -m "${{ vars.CHANGELOG_MESSAGE }} (#${{ env.PR_NUMBER }})"
          git push
        shell: bash
        continue-on-error: true

      - name: Prepare Discord Description
        id: prep_discord
        shell: bash
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [[ "$BODY" == *":cl:"* ]]; then
            CLEAN_CL=$(echo "$BODY" | sed -n '/:cl:/,$p' | sed '1d' | sed -e 's/^[[:space:]]*//')
            echo "CLEAN_BODY<<EOF" >> $GITHUB_ENV
            echo "$CLEAN_CL" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "CLEAN_BODY=Изменения не указаны в формате :cl:" >> $GITHUB_ENV
          fi

      - name: Send Changelog to Discord
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "${{ github.event.pull_request.title }}"
          description: |
            **Список изменений из PR #${{ env.PR_NUMBER }}**

            ```
            ${{ env.CLEAN_BODY }}
            ```
          url: ${{ github.event.pull_request.html_url }}
          color: 0xff0000
          footer: "Автор: ${{ github.event.pull_request.user.login }} • PR #${{ env.PR_NUMBER }} • ${{ github.event.pull_request.merged_at }}"
