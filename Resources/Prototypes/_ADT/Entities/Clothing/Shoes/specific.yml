- type: entity
  parent: ClothingShoesBaseButcherable
  id: ClothingFootWrapsWhite
  name: white footwraps
  description: Pair of pieces of clothing for those who are uncomfortable with ordinary shoes.
  components:
  - type: Sprite
    sprite: _ADT/Clothing/Shoes/Specific/white_footwraps.rsi
    state: icon
  - type: Clothing
    sprite: _ADT/Clothing/Shoes/Specific/white_footwraps.rsi
    slots: [FEET, gloves]
  - type: FootstepModifier
    footstepSoundCollection:
      collection: BarestepHard
  - type: Item
    size: Small

