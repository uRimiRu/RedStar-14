- type: entity
  parent: LavalandCrateNecropolis
  id: LavalandCrateNecropolisAshDrakeFilled
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: AshDrakeNecropolisCrateTable

- type: entityTable
  id: AshDrakeNecropolisCrateTable
  table: !type:GroupSelector
    children:
    - id: WeaponSpectralBlade
    - id: LavaStaffRod
    - id: BottleDragonBlood
    - !type:AllSelector
      children:
      - id: FireballSpellbook
      - id: WeaponWandFireball

- type: entity
  parent: LavalandCrateNecropolis
  id: LavalandCrateNecropolisColossusFilled
  categories: [ HideSpawnMenu ]
