  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: ColossusNecropolisCrateTable

- type: entityTable
  id: ColossusNecropolisCrateTable
  table: !type:AllSelector
    children:
    - id: GemHollowCrystal
    - id: DivineVocalCordsImplant

- type: entity
  parent: LavalandCrateNecropolis
  id: LavalandCrateNecropolisBubblegumFilled
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: BubblegumNecropolisCrateTable

- type: entityTable
  id: BubblegumNecropolisCrateTable
  table: !type:AllSelector
    children:
    - id: GemBloodStone
    - !type:GroupSelector
      children:
      - id: WeaponSpellBlade
      - !type:AllSelector
