- type: entity
  parent: BaseAction
  id: BecomeToDrakeAction
  name: become ash drake
  description: Reveal your draconic form.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Wega/Mobs/Lavaland/ashdrake.rsi
      state: dragon
  - type: InstantAction
    event: !type:BecomeToDrakeActionEvent

- type: entity
  parent: BaseAction
  id: DrakeReturnBackAction
  name: return from ash drake form
  description: Return to your original form.
  categories: [ HideSpawnMenu ]
  components:
  - type: Action
    itemIconStyle: BigAction
    icon:
      sprite: _Wega/Mobs/Lavaland/ashdrake.rsi
      state: dragon
  - type: InstantAction
    event: !type:DrakeReturnBackActionEvent

- type: entity
  parent: BaseAction
  id: ActionMegaLegion
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 1.5
    icon:
      sprite: _Wega/Mobs/Lavaland/legionskull.rsi
      state: legion_head_1
  - type: TargetAction
    range: 10
  - type: EntityTargetAction
    event: !type:MegaLegionAction

- type: entity
  parent: BaseAction
  id: ActionBloodDrunkMinerDash
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 10
    icon:
      sprite: Interface/Actions/jump.rsi
      state: icon
  - type: TargetAction
    range: 10
  - type: WorldTargetAction
    event: !type:BloodDrunkMinerDashAction

