- type: entity
  parent: BaseAction
  id: ActionAshDrakeLava
  components:
  - type: Action
    raiseOnUser: true
    useDelay: 20
    icon:
      sprite: Tiles/Planet/lava.rsi
      state: lava
  - type: TargetAction
    range: 12
  - type: EntityTargetAction
    event: !type:AshDrakeLavaActionEvent
      landingDamage:
        types:
          Blunt: 75
      healingSpec:
        types:
          Blunt: -125
          Slash: -125

