- type: entity
  parent: MobLegion
  id: MobLegionDwarf
  name: dwarf legion
  description: A small and unusually fast fragment of a legion.
  components:
  - type: Sprite
    sprite: _Lavaland/Mobs/lavaland_monsters.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: dwarf_legion
  - type: MobThresholds
    thresholds:
      0: Alive
      60: Dead
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.5
    baseSprintSpeed: 4
  # RS14-start
  - type: Butcherable
    spawned:
    - id: MaterialBones1
      amount: 1
      maxAmount: 3
    - id: LegionCore
      amount: 1
      prob: 0.16
  # RS14-end

- type: entity
  parent: LavalandMobBase
  id: MobMarrowWeaverLavaland
  name: marrow weaver
  description: A giant spider with venom dripping from its jaws and purple chitin.
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Lavaland/weaver.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: weaver
  - type: DamageStateVisuals
    states:
      Alive:
        Base: weaver
      Dead:
        Base: weaver_dead
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Slash: 13
        Structural: 30
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 80
        reagents:
        - ReagentId: Mechanotoxin
          Quantity: 80
  - type: MeleeChemicalInjector
    solution: melee
    transferAmount: 1.5
  - type: MobThresholds
    thresholds:
      0: Alive
      220: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      150: 0.75
  - type: Butcherable
    spawned:
    - id: UraniumOre1
      amount: 2
    - id: MaterialSinew1
      amount: 2
    - id: MaterialBones1
      amount: 3
    - id: MaterialChitin1
      amount: 4
    # RS14-start
    - id: MaterialMarrowWeaverPoisonFang1
      amount: 1
      prob: 0.25
    # RS14-end
  - type: ReplacementAccent
    accent: xeno
  - type: NoSlip
  - type: IgnoreSpiderWeb
  - type: WeatherImmune
  - type: Unrevivable
    analyzable: false
  - type: Speech
    speechVerb: Arachnid
    speechSounds: Arachnid
    allowedEmotes: [ "Click", "Chitter" ]
  - type: Vocal
    sounds:
      Male: UnisexArachnid
      Female: UnisexArachnid
      Unsexed: UnisexArachnid
  - type: TypingIndicator
    proto: spider
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.7
    baseSprintSpeed: 3.7
  - type: NpcFactionMember
    factions:
    - Lavafauna
  - type: HTN
    rootTask:
      task: SimpleHostileCompound
    blackboard:
      VisionRadius: !type:Single
        9
      AggroVisionRadius: !type:Single
        9
      NavSmash: !type:Bool
        true
  - type: Fauna

- type: entity
  parent: MobMarrowWeaverLavaland
  id: MobFrostbiteWeaverLavaland
  name: frostbite weaver
  description: A giant spider with icy venom and blue chitin.
  components:
  - type: Sprite
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: weaver_ice
  - type: DamageStateVisuals
    states:
      Alive:
        Base: weaver_ice
      Dead:
        Base: weaver_ice_dead
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 80
        reagents:
        - ReagentId: Cryoxadone
          Quantity: 80
  # RS14-start
  - type: Butcherable
    spawned:
    - id: UraniumOre1
      amount: 2
    - id: MaterialSinew1
      amount: 2
    - id: MaterialBones1
      amount: 3
    - id: MaterialChitin1
      amount: 4
    - id: MaterialFrostbiteWeaverFrostGland1
      amount: 1
      prob: 0.25
  # RS14-end
