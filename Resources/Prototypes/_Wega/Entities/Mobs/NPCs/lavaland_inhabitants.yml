- type: entity
  parent: MobHuman
  id: BaseMobLavalandInhabitant
  abstract: true
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: Unrevivable
    analyzable: false
  - type: WeatherImmune

- type: entity
  parent: BaseMobLavalandInhabitant
  id: MobHumanInhabitantSquare
  name: inhabitant of the square
  components:
  - type: NpcFactionMember
    factions:
    - AllHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: Loadout
    prototypes:
    - InhabitantSquareGear

- type: startingGear
  id: InhabitantSquareGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorBlack
    mask: ClothingMaskBreath
    shoes: ClothingShoesBootsWinter
    head: ClothingHeadHatHoodWinterColorGray
    outerClothing: ClothingOuterWinterColorGray
    belt: DoubleEmergencyOxygenTankFilled
  inhand:
  - SpearReinforced

- type: entity
  parent: BaseMobLavalandInhabitant
  id: MobHumanInhabitantHermit
  name: hermit
  components:
  - type: Respirator
    saturation: 8
    suffocationThreshold: -6
    maxSaturation: 8
    minSaturation: -4
    updateIntervalMultiplier: 0.8
  - type: NpcFactionMember
    factions:
    - AllHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: Loadout
    prototypes:
    - InhabitantHermitGear

- type: startingGear
  id: InhabitantHermitGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorGrey
    mask: ClothingMaskBreath
    shoes: ClothingShoesColorBlack
    head: ClothingHeadHelmetEVA
    outerClothing: ClothingOuterHardsuitEVA
    suitstorage: OxygenTankFilled

- type: entity
  parent: BaseMobLavalandInhabitant
  id: MobHumanInhabitantBeachGuy
  name: beachgoer
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: NpcFactionMember
    factions:
    - Passive
  - type: HTN
    rootTask:
      task: IdleCompound
  - type: Loadout
    prototypes:
    - InhabitantBeachGuyGear1
    - InhabitantBeachGuyGear2
    - InhabitantBeachGuyGear3
    - InhabitantBeachGuyGear4

- type: startingGear
  id: InhabitantBeachGuyGear1
  equipment:
    jumpsuit: ClothingUniformJumpsuitHawaiRed
    eyes: ClothingEyesGlassesSunglasses
    back: ClothingBackpackSatchel
    pocket1: DrinkIcedBeerGlass
    pocket2: FoodSnackRaisins
  storage:
    back:
    - EmergencyOxygenTankFilled
    - ClothingMaskBreath

- type: startingGear
  id: InhabitantBeachGuyGear2
  equipment:
