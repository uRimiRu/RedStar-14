- type: entity
  parent: BaseMobLavalandInhabitant
  id: MobHumanInhabitantTranslocatedVeterinarian
  name: translocated veterinarian
  components:
  - type: RandomHumanoidAppearance
    randomizeName: true
  - type: NpcFactionMember
    factions:
    - Passive
  - type: HTN
    rootTask:
      task: IdleCompound
  - type: Loadout
    prototypes:
    - InhabitantTranslocatedVeterinarianGear

- type: startingGear
  id: InhabitantTranslocatedVeterinarianGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorWhite
    mask: ClothingMaskBreathMedical
    shoes: ClothingShoesColorWhite
    gloves: ClothingHandsGlovesLatex
    back: ClothingBackpackSatchelMedical
    outerClothing: ClothingOuterCoatLabOpened
    pocket1: EmergencyOxygenTankFilled
  inhand:
  - MedkitFilled
  storage:
    back:
    - MedicatedSuture
    - RegenerativeMesh
    - Bloodpack
    - Gauze
    - SyringeSaline
    - SyringeEphedrine
    - BruteAutoInjector
    - BurnAutoInjector
