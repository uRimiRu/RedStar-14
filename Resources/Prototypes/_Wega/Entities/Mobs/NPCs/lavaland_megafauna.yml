- type: entity
  parent: LavalandBossBubblegum
  id: MobBubblegum
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Lavaland/bubblegum.rsi
    layers:
    - map: [enum.DamageStateVisualLayers.Base]
      state: bubblegum
  - type: BubblegumBoss
    rewards:
    - LavalandCrateNecropolisFilled
    phase1Actions:
    - ActionBubblegumRage
    - ActionBubblegumBloodDive
    - ActionBubblegumTripleDash
    phase1Chances:
      ActionBubblegumRage: 0.1
      ActionBubblegumBloodDive: 0.5
      ActionBubblegumTripleDash: 0.8
    phase2Actions:
    - ActionBubblegumRage
    - ActionBubblegumBloodDive
    - ActionBubblegumIllusionDash
    - ActionBubblegumPentagramDash
    - ActionBubblegumChaoticIllusionDash
    phase2Chances:
      ActionBubblegumRage: 0.4
      ActionBubblegumBloodDive: 0.5
      ActionBubblegumIllusionDash: 0.67
      ActionBubblegumPentagramDash: 0.33
      ActionBubblegumChaoticIllusionDash: 0.75
  - type: NPCUseActionsOnTarget
    actionIds:
    - ActionBubblegumRage
    - ActionBubblegumBloodDive
    - ActionBubblegumTripleDash
  - type: SpawnLootOnDeath
    specialTable: !type:AllSelector
      children:
      - id: TrophyLavalandBubblegumDemonClaws
    weaponWhitelist:
      components:
      - MegafaunaWeaponLooter

- type: entity
  id: MobBubblegumIllusion
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Lavaland/bubblegum.rsi
    state: bubblegum
    noRot: true
  - type: BubblegumIllusion
  - type: MobState
  - type: MobThresholds
    thresholds:
      0: Alive
      2500: Dead
