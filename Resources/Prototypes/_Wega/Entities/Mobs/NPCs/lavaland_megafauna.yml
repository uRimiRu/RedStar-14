- type: entity
  parent: LavalandBossColossus
  id: MobColossus
  components:
  - type: Sprite
    sprite: _Wega/Mobs/Lavaland/colossus.rsi
    layers:
    - map: [enum.DamageStateVisualLayers.Base]
      state: colossus
  - type: BasicEntityAmmoProvider
    proto: BulletColossus
    capacity: 9999
    count: 9999
  - type: Gun
    projectileSpeed: 4
    fireRate: 10
    useKey: false
    soundGunshot: null
  - type: ColossusBoss
