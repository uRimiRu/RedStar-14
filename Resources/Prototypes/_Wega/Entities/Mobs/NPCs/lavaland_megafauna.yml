- type: entity
  parent: MobHuman
  id: MobBloodDrunkMiner
  name: blood-drunk miner
  description: An explorer who has survived Lavaland for far too long.
  components:
  - type: RandomHumanoidAppearance
    randomizeName: false
  - type: NpcFactionMember
    factions:
    - SimpleHostile
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: InputMover
  - type: MobMover
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.5
    baseSprintSpeed: 4.5
  - type: MobThresholds
    thresholds:
      0: Alive
      900: Dead
  - type: MeleeWeapon
    attackRate: 0.8
    damage:
      types:
        Slash: 25
        Structural: 50
  - type: Loadout
    prototypes:
    - BloodDrunkMinerGear
  - type: BloodDrunkMiner
  - type: NPCUseActionsOnTarget
    actionIds:
    - ActionBloodDrunkMinerDash
  - type: SpawnLootOnDeath
    table: !type:AllSelector
      children:
      - id: LavalandCrateNecropolisFilled
    specialTable: !type:AllSelector
      children:
      - id: TrophyLavalandBDMEye
    weaponWhitelist:
      components:
      - MegafaunaWeaponLooter

- type: startingGear
  id: BloodDrunkMinerGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitShaftMiner
    eyes: ClothingEyesGlassesMeson
    mask: ClothingMaskGasExplorer
    gloves: ClothingHandsGlovesCombat
    shoes: ClothingShoesBootsSalvage
    outerClothing: ClothingOuterHardsuitSalvage
    suitstorage: OxygenTankFilled
  inhand:
  - WeaponCrusher
  - WeaponProtoKineticAccelerator

- type: entity
  parent: LavalandBossMegaLegion
  id: BaseMobMegaLegion
  abstract: true
  name: mega legion
  components:
  - type: Sprite
    sprite: _Lavaland/Mobs/Bosses/96x96.rsi
    layers:
    - map: [enum.DamageStateVisualLayers.Base]
      state: mega_legion
  - type: MobThresholds
    thresholds:
      0: Alive
      800: Dead
  - type: NPCUseActionsOnTarget
    actionIds:
    - ActionMegaLegion
  - type: LegionBoss
    summonCount: 3
    rewards:
    - LavalandCrateNecropolisFilled

- type: entity
  parent: BaseMobMegaLegion
  id: MobMegaLegion
  components:
