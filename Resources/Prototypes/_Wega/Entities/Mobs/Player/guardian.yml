- type: entity
  name: ash guardian
  parent: MobGuardianBase
  id: MobAshGuardian
  description: A creature from the depths of Lavaland, bound to its owner's life.
  components:
  - type: GhostRole
    allowMovement: true
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-ash-guardian-name
    description: ghost-role-information-ash-guardian-description
    rules: ghost-role-information-familiar-rules
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: RandomSprite
    available:
    - enum.DamageStateVisualLayers.BaseUnshaded:
        magic_flare: Sixteen
  - type: Sprite
    layers:
    - state: magic_base
      map: [ "enum.DamageStateVisualLayers.Base" ]
    - state: magic_flare
      map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      color: "#40a7d7"
      shader: unshaded
  - type: HTN
    rootTask:
      task: SimpleHumanoidHostileCompound
  - type: MeleeWeapon
    hidden: false
    altDisarm: false
    animation: WeaponArcFist
    attackRate: 1.8
    autoAttack: true
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 12
        Heat: 12
        Structural: 50
  - type: ProtectedFromStepTriggers
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 25
        mask:
        - FlyingMobMask
        layer:
        - FlyingMobLayer
  - type: Physics
    bodyStatus: InAir
  - type: NoSlip
  - type: MovementAlwaysTouching
  - type: CanMoveInAir
