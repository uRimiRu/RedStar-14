- type: entity
  id: BaseFloorEntity
  abstract: true
  name: tile
  placement:
    mode: SnapgridCenter
  components:
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags:
    - Anchorable
  - type: Rotatable
  - type: Clickable
  - type: Sprite
    sprite: _Wega/Lavaland/Structures/floors.rsi
    drawdepth: FloorTiles
  - type: Transform
    anchored: true
  - type: FootstepModifier
    footstepSoundCollection:
      collection: FootstepFloor
      params:
        volume: 8
  - type: Tag
    tags:
      - HideContextMenu
      - Catwalk

