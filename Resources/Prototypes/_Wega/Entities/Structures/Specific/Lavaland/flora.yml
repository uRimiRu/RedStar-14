- type: entity
  id: BaseWegaLavalandFlora
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/flora.rsi
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Transform
    anchored: true
  - type: Rotatable
  - type: Flora
  - type: Appearance

# Cactus
- type: entity
  parent: BaseWegaLavalandFlora
  id: LavalandFloraCactus1
  name: barrel cactus
  description: A prickly desert plant which sometimes produces juicy fruit.
  components:
  - type: Sprite
    layers:
    - state: cactus1
      map: [ "flora" ]
  - type: Flora
    harvestPrototype: FoodFloraCactusFruit
    maxYield: 1
  - type: GenericVisualizer
    visuals:
      enum.FloraVisuals.State:
        flora:
          Grown: { state: cactus1 }
          Harvested: { state: cactus1h }
  - type: CollisionWake
    enabled: false
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        hard: false
        layer:
        - LowImpassable
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.2,-0.2,0.2,0.2"
        density: 30
        mask:
        - ItemMask
  - type: Slippery
    slipData:
      launchForwardsMultiplier: 0
  - type: StepTrigger
    intersectRatio: 0.2
  - type: PreventableStepTrigger
  - type: TriggerOnStepTrigger
  - type: DamageOnTrigger
    targetUser: true
    damage:
      types:
        Piercing: 4.5

- type: entity
  parent: LavalandFloraCactus1
  id: LavalandFloraCactus2
  components:
  - type: Sprite
    layers:
    - state: cactus2
      map: [ "flora" ]
  - type: GenericVisualizer
    visuals:
      enum.FloraVisuals.State:
        flora:
          Grown: { state: cactus2 }
          Harvested: { state: cactus2h }

- type: entity
  parent: LavalandFloraCactus1
  id: LavalandFloraCactus3
  components:
  - type: Sprite
    layers:
    - state: cactus3
      map: [ "flora" ]
  - type: GenericVisualizer
    visuals:
      enum.FloraVisuals.State:
        flora:
          Grown: { state: cactus3 }
          Harvested: { state: cactus3h }

- type: entity
  parent: LavalandFloraCactus1
