- type: entity
  parent: MaterialBase
  id: MaterialSinew
  name: sinew
  description: A tough bundle of tendons taken as a hunter's trophy.
  suffix: Full
  components:
  - type: Sprite
    sprite: _Wega/Objects/Materials/sinew.rsi
    layers:
    - state: sinew
      map: [ "base" ]
  - type: StaticPrice
    price: 0
  - type: StackPrice
    price: 500
  - type: Appearance
  - type: Stack
    stackType: Sinew
    baseLayer: base
    layerStates:
    - sinew
    - sinew_2
    - sinew_3
  - type: Item
    size: Large
    sprite: _Wega/Objects/Materials/sinew.rsi
    shape:
    - 0,0,1,1
  - type: Tag
    tags:
    - MaterialsThrophy
    - Sinew

- type: entity
  parent: MaterialSinew
  id: MaterialSinew1
  suffix: 1
