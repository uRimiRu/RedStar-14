- type: entity
  parent: BaseItem
  id: LavaStaffRod
  name: staff of lava
  description: The power of fire and stone is in your hands.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/lavastaff.rsi
    state: icon
  - type: Clothing
    sprite: _Wega/Objects/Specific/Lavaland/lavastaff.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Item
    size: Normal
    storedRotation: -45
  - type: MeleeWeapon
    attackRate: 0.5
    damage:
      types:
        Heat: 15
  - type: UseDelay
    delay: 10
  - type: LavaStaff
    useSound:
      path: /Audio/Effects/stonedoor_openclose.ogg
  - type: StaticPrice
    price: 5000

- type: entity
  parent: BaseItem
  id: BottleDragonBlood
  name: bottle of dragon blood
  description: Its unstable power permanently changes whoever drinks it.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/vial.rsi
    state: icon
  - type: DragonBlood
  - type: StaticPrice
    price: 5000

- type: entity
  parent: BaseSubdermalImplant
  id: DivineVocalCordsImplant
  name: divine vocal cords
  description: An implant carrying the voice of an ancient god. A forceful command can knock nearby creatures down.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/voicegod.rsi
    state: icon
  - type: DivineVocalCordsImplant
  - type: SubdermalImplant
    whitelist:
      components:
      - MobState
  - type: StaticPrice
    price: 5000

- type: entity
  parent: BaseSword
  id: WeaponSpectralBlade
  name: spectral blade
  description: A dull blade that grows stronger by stealing the souls of humanoids slain with it.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/spectral_blade.rsi
  - type: Item
    sprite: _Wega/Objects/Weapons/Melee/spectral_blade.rsi
    storedRotation: -45
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Slash: 1
  - type: DisarmMalus
  - type: SoulStorage
  - type: StaticPrice
    price: 5000

- type: entity
  parent: BaseSword
  id: WeaponSpellBlade
  name: spellblade
  description: A blade able to launch a small reserve of self-recharging arcane bolts.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/spell_blade.rsi
  - type: Item
    sprite: _Wega/Objects/Weapons/Melee/spell_blade.rsi
    storedRotation: -45
    shape:
    - 0,0,1,2
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Slash: 25
  - type: Gun
    soundGunshot: /Audio/Weapons/emitter.ogg
    soundEmpty: null
    fireRate: 1
    useKey: false
  - type: AmmoCounter
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 0.9
  - type: BasicEntityAmmoProvider
    proto: ProjectileArcaneBarrage
    capacity: 4
    count: 4
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 5
  - type: Reflect
    reflectProb: 0.5
    spread: 90
  - type: DisarmMalus
  - type: StaticPrice
    price: 5000

- type: entity
  parent: BaseItem
  id: RodOfAsclepius
  name: rod of Asclepius
  description: Taking its oath grants a healing aura, but permanently renounces violence.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/rod_asclepius.rsi
    layers:
    - state: icon_dormant
      map: [ "enum.VisualLayers.Layer" ]
  - type: Item
    heldPrefix: dormant
  - type: RodOfAsclepius
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.VisualLayers.Enabled:
        enum.VisualLayers.Layer:
          True: { state: icon_active }
          False: { state: icon_dormant }

- type: entity
  parent: BaseItem
  id: CubeRed
  name: red linked cube
  description: Teleports its user to the paired blue cube.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/cube.rsi
    state: red
  - type: LinkedCube
    pairPrototype: CubeBlue
    isPrimary: true

- type: entity
  parent: BaseItem
  id: CubeBlue
  name: blue linked cube
  description: Teleports its user to the paired red cube.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/cube.rsi
    state: blue
  - type: LinkedCube
    pairPrototype: CubeRed

- type: entity
  parent: BaseItem
  id: DarkShard
  name: dark shard
  description: A sinister shard containing a shadow-forged blade.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/dark_shard.rsi
    state: icon
  - type: SpawnItemsOnUse
    items:
    - id: ShadowKatana

- type: entity
  parent: BaseItem
  id: DustyShard
  name: dusty shard
  description: A glowing shard capable of binding a guardian to a host.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/dusty_shard.rsi
    state: icon
  - type: GuardianCreator
    guardianProto: MobAshGuardian

- type: entity
  parent: BaseItem
  id: LegionCore
  name: legion core
  description: A fading organic core capable of rapidly restoring damaged tissue.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Specific/Lavaland/legioncore.rsi
    layers:
    - state: icon_active
      map: [ "enum.VisualLayers.Layer" ]
  - type: Item
    size: Small
  - type: Damageable
  - type: Reactive
    reactions:
    - reagents: [ StabilizingSerum ]
      methods: [ Touch ]
      effects:
      - !type:StabilizeLegionCore
  - type: LegionCore
    healAmount:
      types:
        Blunt: -25
        Slash: -25
        Piercing: -25
        Heat: -25
        Cold: -25
        Poison: -25
        Bloodloss: -25
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.VisualLayers.Enabled:
        enum.VisualLayers.Layer:
          True: { state: icon_active }
          False: { state: icon_base }
  - type: StaticPrice
    price: 250

- type: entity
  parent: BaseChemistryBottleFilled
  id: ChemistryBottleStabilizingSerum
  name: stabilizing serum bottle
  description: A reagent formulated to preserve a living legion core.
  components:
  - type: Label
    currentLabel: stabilizing serum
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: StabilizingSerum
          Quantity: 30
