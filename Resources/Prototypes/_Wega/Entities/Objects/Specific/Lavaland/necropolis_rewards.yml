- type: entity
  parent: ClothingHandsBase
  id: ClothingHandsGlovesConcussiveGauntlets
  name: concussive gauntlets
  description: Mining tools worn directly on the hands.
  components:
  - type: Sprite
    sprite: _Wega/Clothing/Hands/Gloves/concussive_gauntlets.rsi
  - type: Clothing
    sprite: _Wega/Clothing/Hands/Gloves/concussive_gauntlets.rsi
  - type: MeleeWeapon
    autoAttack: true
    angle: 0
    wideAnimationRotation: -90
    soundHit:
      path: /Audio/Items/drill_hit.ogg
    attackRate: 4
    damage:
      types:
        Structural: 30
        Blunt: 6
    mustBeEquippedToUse: true
  - type: Fiber
    fiberMaterial: fibers-durathread
    fiberColor: fibers-blue
  - type: FingerprintMask
  - type: StaticPrice
    price: 2500

- type: entity
  parent: BaseSword
  id: WeaponPossessedBlade
  name: possessed blade
  description: A sentient blade waiting for a spirit to awaken within it.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Weapons/Melee/possessed_blade.rsi
  - type: MeleeWeapon
    attackRate: 2
    damage:
      types:
        Slash: 17.5
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    shape:
    - 0,0,1,3
  - type: Clothing
    sprite: _Wega/Objects/Weapons/Melee/possessed_blade.rsi
    slots:
    - Belt
  - type: GhostRole
    allowSpeech: true
    makeSentient: true
    name: ghost-role-information-possessed-blade-name
    description: ghost-role-information-possessed-blade-description
    rules: ghost-role-information-familiar-rules
    raffle:
      settings: default
  - type: GhostTakeoverAvailable
  - type: StaticPrice
    price: 2500

- type: entity
  parent: FlaskBase
  id: DrinkUnholyFlask
  name: old flask
  description: A dusty flask marked with an ominous symbol.
  components:
  - type: Sprite
    sprite: _Wega/Objects/Consumable/Drinks/unholyflask.rsi
    state: icon

- type: entity
  parent: DrinkUnholyFlask
  id: DrinkUnholyFlaskFull
  suffix: Full
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        reagents:
        - ReagentId: UnholyWater
          Quantity: 50

