# Tiles
- type: entity
  name: terracotta tile
  parent: FloorTileItemBase
  id: FloorTileItemTerracotta
  description: Can serve as decent throwing weapon.
  components:
  - type: Sprite
    sprite: _RedStar/Objects/Tiles/tile.rsi
    state: terracotta
  - type: Item
    heldPrefix: terracotta
  - type: FloorTile
    outputs:
    - Plating
    - FloorTerracotta
  - type: Stack
    stackType: FloorTileTerracotta

