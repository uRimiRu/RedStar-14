- type: entity
  id: BaseSkillBook
  parent: BaseItem
  abstract: true
  name: skill book
  description: A practical manual for learning a skill.
  components:
  - type: Sprite
    sprite: _RedStar/Objects/Misc/skill_books.rsi
    state: cooking
  - type: Item
    size: Small
  - type: UseDelay
    delay: 1
  - type: Tag
    tags:
    - Book
    - Paper
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_Goobstation/Items/handling/book_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_Goobstation/Items/handling/book_drop.ogg
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_Goobstation/Items/handling/book_drop.ogg
      params:
        volume: -4
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    damage:
      types:
        Blunt: 1
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 1

