- type: entity
  name: lava lamp
  id: LavaLamp
  parent: BaseItem
  description: A light emitting device, moths' favorite.
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Objects/Misc/lavalamp.rsi
    layers:
      - state: lavalamp
      - state: lavalamp-on
        shader: unshaded
        visible: false
        map: [ "light" ]
  - type: Item
    size: Small
  - type: PointLight
    enabled: false
    netsync: false
    radius: 3
    energy: 2
  - type: ItemToggle
    soundActivate:
      path: /Audio/Effects/Chemistry/bubbles.ogg
      params:
        pitch: 3
        volume: -3
    soundDeactivate:
      path: /Audio/_CorvaxGoob/Machine/terminal_off.ogg
      params:
        pitch: 4
        volume: -1
  - type: ToggleableVisuals
    spriteLayer: light
  - type: ItemTogglePointLight
  - type: Appearance
  - type: PhysicalComposition
    materialComposition:
      Plastic: 50
  - type: SolutionContainerManager
    solutions:
      lamp:
        maxVol: 5
        reagents:
        - ReagentId: Oil
          Quantity: 3
        - ReagentId: Phlogiston
          Quantity: 2
  - type: Temperature
  - type: DamageOnLand
    damage:
      types:
        Blunt: 5
  - type: DamageOtherOnHit
    damage:
      types:
        Blunt: 4
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 5
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpillBehavior
        solution: lamp
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetPlastic:
            min: 1
            max: 1
        transferForensics: true
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: LavaLampExposion
    node: start
  - type: Physics
    canCollide: false
  - type: Tag
    tags:
    - Recyclable

