# Pizza

- type: entity
  name: pyrotton pizza
  parent: FoodPizzaBase
  id: FoodPizzaPyrotton
  description: Flat fabric cotton dough with pyrotton topping. Incredible.
  components:
  - type: FlavorProfile
    flavors:
    - cotton
    - pyrotton
    - bread
  - type: Sprite
    sprite: _CorvaxGoob/Objects/Consumable/Food/Baked/pizza.rsi
    layers:
    - state: pyrotton-pizza
  - type: Food
    requiresSpecialDigestion: true
  - type: SliceableFood
    slice: FoodPizzaPyrottonSlice
  - type: Tag
    tags:
    - ClothMade
    - Pizza
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 15
        - ReagentId: Vitamin
          Quantity: 5
        - ReagentId: Fiber
          Quantity: 10
        - ReagentId: Phlogiston
          Quantity: 5

- type: entity
  name: slice of pyrotton pizza
  parent: FoodPizzaSliceBase
  id: FoodPizzaPyrottonSlice
  description: A slice of pyrotton pizza. Pyrotton included.
  components:
  - type: FlavorProfile
    flavors:
    - cotton
    - pyrotton
    - bread
  - type: Food
    trash:
    - FoodCottonPizzaCrust
  - type: Sprite
    sprite: _CorvaxGoob/Objects/Consumable/Food/Baked/pizza.rsi
    layers:
    - state: pyrotton-slice
  - type: Item
    heldPrefix: pyrotton-slice
  - type: Tag
    tags:
    - ClothMade
    - Pizza
    - Slice
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 6
        reagents:
        - ReagentId: Nutriment
          Quantity: 3
        - ReagentId: Vitamin
          Quantity: 0.8
        - ReagentId: Fiber
          Quantity: 1.5
        - ReagentId: Phlogiston
          Quantity: 0.5

