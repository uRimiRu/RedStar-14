- type: entity
  parent: BaseMedicalPDA
  id: SurgeonPDA
  name: surgeon PDA
  description: Shiny and sterile.
  components:
  - type: Pda
    id: SurgeonIDCard
  - type: PdaBorderColor
    borderColor: "#d7d7d0"
    accentVColor: "#5db8be"
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-surgeon
  - type: Icon
    sprite: _CorvaxGoob/Objects/Devices/pda.rsi
    state: pda-surgeon
  - type: Sprite
    sprite: _CorvaxGoob/Objects/Devices/pda.rsi
    state: pda-surgeon
  - type: GuideHelp
    guides:
    - MedicalDoctor

- type: entity
  parent: BaseSecurityPDA
  id: WardenHelperPDA
  name: warden assistant PDA
  description: The OS appears to have been jailbroken.
  components:
  - type: Pda
    id: WardenHelperIDCard
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-warden
  - type: PdaBorderColor
    borderColor: "#A32D26"
    accentVColor: "#949137"
  - type: Icon
    state: pda-warden

- type: entity
  parent: BaseSecurityPDA
  id: PilotPDA
  name: pilot PDA
  description: Нas protection from cosmic radiation.
  components:
    - type: Pda
      id: PilotIDCard
    - type: Appearance
      appearanceDataInit:
        enum.PdaVisuals.PdaType:
          !type:String
          pda-seniorofficer
    - type: PdaBorderColor
      borderColor: "#A32D26"
      accentVColor: "#DFDFDF"
    - type: Icon
      state: pda-seniorofficer

- type: entity
  parent: BaseSecurityPDA
  id: MagistratePDA
  name: magistrate's PDA
  description: Corporation and profit are best friends.
  components:
  - type: Sprite
    sprite: _CorvaxGoob/Objects/Devices/pda.rsi
    state: pda-magistrat
  - type: Pda
    id: MagistrateIDCard
    penSlot:
      startingItem: PenLegal
      whitelist:
        tags:
        - Write
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-magistrate
  - type: PdaBorderColor
    borderColor: "#6f6192"
  - type: Icon
    sprite: _CorvaxGoob/Objects/Devices/pda.rsi
    state: pda-magistrate

- type: entity
  parent: BaseItem
  id: StationAiPDA
  categories: [ HideSpawnMenu ]
  components:
  - type: StationAiWhitelist
  - type: Sprite
    sprite: Objects/Devices/pda.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
      state: "pda"
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
    - state: "insert_overlay"
      map: [ "enum.PdaVisualLayers.Pen" ]
  - type: Icon
    sprite: Objects/Devices/pda.rsi
    state: pda
  - type: Pda
    id: PassengerIDCard
    idSlot:
      name: access-id-card-component-default
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_insert.ogg
      whitelist:
        components:
        - IdCard
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      PDA-id: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
      PDA-pai: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
      Cartridge-Slot: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
      program-container: !type:Container
        showEnts: false
        occludes: true
        ents: []
      PDA-pen: !type:ContainerSlot
        showEnts: false
        occludes: true
        ent: null
  - type: ItemSlots
  - type: Ringer
  - type: CartridgeLoader
    uiKey: enum.PdaUiKey.Key
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NewsReaderCartridge
      - NanoChatCartridge
      - MailMetricsCartridge
      - WantedListCartridge
    cartridgeSlot:
      priority: -1
      name: device-pda-slot-component-slot-name-cartridge
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_insert.ogg
      whitelist:
        components:
          - Cartridge
  - type: ActivatableUI
    key: enum.PdaUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.PdaUiKey.Key:
        type: PdaBoundUserInterface
