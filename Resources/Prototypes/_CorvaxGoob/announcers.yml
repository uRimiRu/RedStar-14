- type: announcer
  id: Intern
  minDaysInMonth: 5
  shuttleRecallSound:
    collection: InternShuttleRecall
  shuttleCallSound:
    collection: InternShuttleCall
  shuttleDockedSound:
    path: /Audio/Announcements/shuttle_dock.ogg
  centcomAnnouncementSound:
    collection: InternCommandReport

- type: soundCollection
  id: InternCommandReport
  files:
  - /Audio/_CorvaxGoob/Announcements/centcomm.ogg

- type: soundCollection
  id: InternShuttleCall
  files:
  - /Audio/Announcements/shuttlecalled.ogg

- type: soundCollection
  id: InternShuttleRecall
  files:
  - /Audio/Announcements/shuttlerecalled.ogg

- type: soundCollection
  id: InternEventPowerOff
  files:
  - /Audio/Announcements/power_off.ogg

- type: soundCollection
  id: InternAlertBlue
  files:
  - /Audio/Misc/bluealert.ogg

- type: soundCollection
  id: InternAlertRed
  files:
  - /Audio/Misc/redalert.ogg

- type: soundCollection
  id: InternEventMeteor
  files:
  - /Audio/Announcements/meteors_start.ogg
